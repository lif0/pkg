name: 🧰 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (example: v1.0.1 or 1.0.1 — prefix `v` will be added)"
        required: true
      make_latest:
        description: "Mark as latest"
        type: choice
        options: ["true", "false", "legacy"]
        default: "true"
      prerelease:
        description: "Prerelease? (leave empty to auto-detect by version suffix)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Compute tag and prerelease flag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          [[ "$VERSION" =~ ^v ]] || VERSION="v${VERSION}"

          PRERELEASE="false"
          INPUT_PRE="${{ inputs.prerelease || '' }}"
          if [[ -n "$INPUT_PRE" ]]; then
            shopt -s nocasematch
            [[ "$INPUT_PRE" =~ ^(1|true|yes|y)$ ]] && PRERELEASE="true"
            shopt -u nocasematch
          elif [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: ${{ inputs.make_latest }}
          draft: false
          prerelease: ${{ steps.vars.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
